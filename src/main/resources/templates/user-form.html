<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div th:replace="fragments/header :: header"></div>

<h2 th:text="${user.id} == null ? 'Add User' : 'Edit User'"></h2>

<form th:action="@{/save}" th:object="${user}" method="post">
    <input type="hidden" th:field="*{id}" />
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Enter Name" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Enter Email" required>
    </div>
    <button type="submit" class="btn btn-success">Submit</button>
    <a th:href="@{ / }" class="btn btn-secondary">Cancel</a>
</form>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
